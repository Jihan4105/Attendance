<!DOCTYPE html>
<html>
<body>

            <input type="text" class="form-control" id="subject_fix" name="username" data-toggle="popover" title="Popover Header" data-content="Some content inside the popover" onclick="Show_Popover()" readonly />
        </div>
        <div class="form-group">
            <label for="usr">강의시간:</label>
            <input type="text" class="form-control" id="times_fix" name="username">

        <div class="form-group">
            <label for="usr">강사:</label>
            <input type="text" class="form-control" id="person_fix" name="username">
        </div>
        <button type="submit" class="btn btn-primary" onclick="Lec_Fix_Button()">Submit</button>
    </div>
</body>
</html>
