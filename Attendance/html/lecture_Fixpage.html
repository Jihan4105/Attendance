<!DOCTYPE html>
<html>
<body>
    <div id="lecturefix">
        <h1>강의 수정</h1>
        <div class="form-group">
            <label for="usr">과목명:</label>
            <input type="text" class="form-control" id="subject_fix" name="username" data-toggle="popover" title="Popover Header" data-content="Some content inside the popover" onclick="ShowPopup()" readonly />
        </div>
        <div class="form-group">
            <label for="usr">강의시간:</label>
            <input type="text" class="form-control" id="times_fix" name="username">
        </div>
        <div class="form-group">
            <label for="usr">강사:</label>
            <input type="text" class="form-control" id="person_fix" name="username">
        </div>
        <button type="submit" class="btn btn-primary" onclick="FixTableRow()">Submit</button>
    </div>
</body>
</html>
