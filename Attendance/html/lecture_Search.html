<div id="lectureSearching">
    <div class="search_navbar">
        <span class="searchspan">
            강의검색
        </span>
        <div class="input-group mb-3" id="searchbar">
            <input type="text" class="form-control" placeholder="Search">
            <div class="input-group-append">
                <button class="btn btn-success" type="submit">Go</button>
            </div>
        </div>
        <button type="button" class="btn btn-secondary" id="buttonfix" onclick="LectureSelectFix();">수정</button>
        <button type="button" class="btn btn-danger" id="buttonfix" onclick="LectureSelectDelete();">삭제</button>
        <button type="button" class="btn btn-success" id="buttonfix" onclick="GoAddSite();">등록</button>
    </div>
    <div id="tablecontents">
        <table class="table table-striped">
            <thead style="background-color: lightgray">
                <tr>
                    <th>No.</th>
                    <th>과목</th>
                    <th>강의시간</th>
                    <th>강사</th>
                </tr>
            </thead>
            <tbody id="lecturelist">
            </tbody>
        </table>
    </div>
</div>
