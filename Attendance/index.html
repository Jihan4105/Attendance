<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bootstrap 4 Website Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">

    <link rel="stylesheet" href="./css/sidenav.css">
    <link rel="stylesheet" href="./css/lecture_search.css">
    <script src="./js/main.js"></script>
    <script src="./js/LectureOption.js"></script>
</head>
<body>
    <nav id="topNav" class="navbar navbar fixed-top navbar-expand-sm bg-dark navbar-dark">
        <span><i class="fa fa-bar-chart" style="font-size: 20px; color: white;"></i></span>&nbsp;&nbsp;&nbsp;
        <a class="navbar-brand" style="float: left; font-size: 24px; font-weight: bold;">전자출결관리시스템</a>
        <button class="navbar-toggler" type="button" onclick="sideNavShowHide()">
            <span class="navbar-toggler-icon"></span>
        </button>
    </nav>
    <div id="sideNav" class="sidenav">
        <button id="dropdown-btn" class="dropdown-btn" onclick="submenuShowHide()">
            강의관리<i class="fa fa-caret-down"></i>
        </button>
        <div id="dropdown-container" class="dropdown-container">
            <a href="#" onclick="LectureSearch()">강의 검색</a>
            <a href="#" onclick="GoAddSite()">강의 등록</a>
            <a href="#" onclick="GoFixSite()">강의 수정</a>
        </div>
        <a href="#services">출결관리</a>
        <a href="#clients">HelloWorld</a>
        <a href="#contact">Contact</a>
        <a href="#contact">Search</a>
    </div>

    <div class="main">
        <div id="mainBase">
            <h2>메뉴를 선택했을 때, 컨텐츠가 디스플레이 되는 영역 !!</h2>
            <br />
            <p>메뉴를 선택하면 각 메뉴에 적합한 GUI가 나타나게 한다.</p>
            <p>각 기능은 검색, 입력, 수정, 삭제 등이 가능할 수 있다.</p>
            <p>검색 화면은 그래프, 테이블 등 가능한 시각적으로 판단하기 쉬운 방법을 택한다.</p>
        </div>
    </div>

    <div class="row footer d-flex justify-content-center align-items-center" style="height: 50px; margin-bottom:0">
        @2021 Footer
    </div>

</body>
</html>
